version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/app/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Warsaw"

    groups:
      python-security:
        applies-to: security-updates
        patterns:
          - "*"

    labels:
      - "dependencies"
      - "security"
      - "backend"

    commit-message:
      prefix: "security"