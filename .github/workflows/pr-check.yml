name: PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/apps/**'
      - 'app/packages/**'
      - 'app/api/**'

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-slim
    outputs:
      packages-and-apps: ${{ steps.filter.outputs.packages-and-apps }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            packages-and-apps:
              - 'app/packages/**'
              - 'app/apps/kitchen-panel/**'
              - 'app/apps/mobile-app/**'
              - 'app/apps/admin-panel/**'
              - 'app/apps/public-web/**'
            api:
              - 'app/api/**'

  apps-and-packages:
    name: Apps and Packages Validation
    runs-on: ubuntu-slim
    needs: detect-changes
    if: needs.detect-changes.outputs.packages-and-apps == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Validate all Apps and Packages
        uses: ./.github/actions/pr-validate/typescript
      
      - name: Comment coverage on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage-summary.md
          header: typescript-coverage

  api:
    name: Python API Validation
    runs-on: ubuntu-slim
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Validate Python Code
        uses: ./.github/actions/pr-validate/python

      - name: Comment coverage on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: app/api/coverage-summary.md
          header: python-api-coverage

  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv & pip-audit
        shell: bash
        run: pip install uv pip-audit

      - name: Install Python dependencies
        working-directory: app/api
        shell: bash
        run: uv sync

      - name: Audit Python dependencies
        working-directory: app/api
        shell: bash
        run: pip-audit -r <(uv pip freeze) --desc

      - name: Read Bun version from package.json
        shell: bash
        run: |
          BUN_VERSION=$(jq -r '.packageManager' package.json | sed 's/^bun@//')
          echo "BUN_VERSION=$BUN_VERSION" >> $GITHUB_ENV

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install JS dependencies
        shell: bash
        run: bun install

      - name: Audit JS dependencies
        shell: bash
        run: bun audit || true