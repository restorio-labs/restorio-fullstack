name: Deploy Vinext Frontend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment name
        required: true
        type: string
        default: production
      version_bump:
        description: Semantic version bump (auto = use package.json versions)
        type: choice
        options:
          - auto
          - major
          - minor
          - patch
        default: auto
  workflow_call:
    inputs:
      environment:
        description: GitHub Environment name
        required: true
        type: string
      version_bump:
        description: Semantic version bump (auto = use package.json versions)
        required: false
        type: string
        default: auto

concurrency:
  group: deploy-vinext-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-public-web-cloudflare:
    name: Deploy public-web to Cloudflare
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/set-restorio-app-version
        with:
          version_bump: ${{ inputs.version_bump }}

      - uses: ./.github/actions/setup-bun

      - name: Build workspace packages
        run: bun run turbo run build --filter='./app/packages/*'

      - name: Validate required Cloudflare secrets
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Missing required secret CLOUDFLARE_API_TOKEN for environment ${{ inputs.environment }}"
            exit 1
          fi

      - name: Deploy public-web with vinext/wrangler
        working-directory: app/apps/public-web
        env:
          VITE_ENV: production
          NODE_ENV: production
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.restorio.org/api/v1' }}
          NEXT_PUBLIC_PUBLIC_WEB_URL: ${{ vars.VITE_PUBLIC_WEB_URL || 'https://restorio.org' }}
          NEXT_PUBLIC_ADMIN_PANEL_URL: ${{ vars.VITE_ADMIN_PANEL_URL || 'https://admin.restorio.org' }}
          NEXT_PUBLIC_BASE_URL: ${{ vars.VITE_PUBLIC_WEB_URL || 'https://restorio.org' }}
        run: VITE_APP_VERSION="$PUBLIC_WEB_VERSION" bunx vinext deploy
