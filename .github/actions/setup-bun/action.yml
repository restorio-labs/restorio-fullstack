name: Setup Bun and install
description: Read Bun version from root package.json, install Bun, run bun install

runs:
  using: composite
  steps:
    - name: Read Bun version from package.json
      shell: bash
      run: |
        BUN_VERSION=$(jq -r '.packageManager' package.json | sed 's/^bun@//')
        if [[ -z "$BUN_VERSION" || "$BUN_VERSION" == "null" ]]; then
          echo "❌ packageManager not found or invalid in package.json"
          exit 1
        fi
        echo "BUN_VERSION=$BUN_VERSION" >> $GITHUB_ENV

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ env.BUN_VERSION }}

    - name: Install dependencies
      shell: bash
      run: bun install
