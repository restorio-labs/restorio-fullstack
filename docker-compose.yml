services:
  api:
    build:
      context: ./app/api
      dockerfile: Dockerfile
    container_name: restorio-api
    # ports:
    #   - "8000:8000"
    environment:
      - PROJECT_NAME=${PROJECT_NAME:-Restorio API}
      - PROJECT_DESCRIPTION=${PROJECT_DESCRIPTION:-Multi-tenant Restaurant Management Platform API}
      - VERSION=${VERSION:-0.1.0}
      - DATABASE_URL=${DATABASE_URL:-mongodb://mongo:27017/restorio}
      - DATABASE_NAME=${DATABASE_NAME:-restorio}
      - MONGODB_USERNAME=${MONGODB_USERNAME:-}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD:-}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql://restorio:restorio@postgres:5432/restorio}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - API_V1_PREFIX=${API_V1_PREFIX:-/api/v1}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://localhost:3001","http://localhost:3002","http://localhost:3003","http://localhost:3004","https://restorio.org","https://*.restorio.org"]}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-14}
      - ACCESS_TOKEN_COOKIE_NAME=${ACCESS_TOKEN_COOKIE_NAME:-rat}
      - REFRESH_TOKEN_COOKIE_NAME=${REFRESH_TOKEN_COOKIE_NAME:-rrt}
      - SESSION_HINT_COOKIE=${SESSION_HINT_COOKIE:-rshc}
      - PRZELEWY24_MERCHANT_ID=${PRZELEWY24_MERCHANT_ID:-0}
      - PRZELEWY24_POS_ID=${PRZELEWY24_POS_ID:-0}
      - PRZELEWY24_CRC=${PRZELEWY24_CRC:-}
      - PRZELEWY24_API_KEY=${PRZELEWY24_API_KEY:-}
      - PRZELEWY24_API_URL=${PRZELEWY24_API_URL:-https://sandbox.przelewy24.pl/api/v1}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-restorio-media}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_PRESIGN_EXPIRY_SECONDS=${MINIO_PRESIGN_EXPIRY_SECONDS:-900}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./app/api:/app
      - /app/.venv
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - restorio-network
    restart: unless-stopped
    command: >
      sh -c 'uv run alembic upgrade head && exec uvicorn main:app --host 0.0.0.0 --port 8000'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: restorio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - restorio-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: restorio-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-restorio}
      - POSTGRES_USER=${POSTGRES_USER:-restorio}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-restorio}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - restorio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo:
    image: mongo:7
    container_name: restorio-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USERNAME:-restorio}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD:-restorio}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - restorio-network
    restart: unless-stopped
    command: ["mongod", "--quiet", "--logpath", "/dev/null"]  # Suppress MongoDB startup logs 0=errors only 1=warnings >2=more verbose
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: restorio-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_API_CORS_ALLOW_ORIGIN=${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - restorio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: restorio-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - restorio-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis-data:
  postgres-data:
  mongo-data:
  minio-data:

networks:
  restorio-network:
    driver: bridge
